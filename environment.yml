name: lite-mono
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - numpy<2.0
  - intel-openmp=2021.4.0
  - pillow
  - matplotlib
  - scikit-image
  - pip

  # --- PyTorch (CUDA 11.8) ---
  # Change the cuda version below if your GPU driver requires a different one.
  # Run `nvidia-smi` to check the maximum supported CUDA version.
  - pytorch::pytorch>=1.12,<2.1
  - pytorch::torchvision
  - pytorch::pytorch-cuda=11.8

  # --- pip-only packages ---
  - pip:
      - opencv-python<4.10
      - wget
      - requests
      - pyyaml
      - rosbags
      - tensorboardX>=2.2
      - timm==0.4.12
      - thop
      - six>=1.16.0
      - fvcore>=0.1.5
      - protobuf>=3.20,<4
      - git+https://github.com/saadnaeem-dev/pytorch-linear-warmup-cosine-annealing-warm-restarts-weight-decay
